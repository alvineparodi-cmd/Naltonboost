<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaltonBoost</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
    }

    h1 { color: #00e5ff; }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #16161d;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00e5ff;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>NaltonBoost 🚀</h1>
  <p>SMM Panel RDC</p>
</header>

<div class="container">

  <div class="card">
    <h2>👤 Compte</h2>
    <p id="userInfo">Non connecté</p>
    <button onclick="logout()">Déconnexion</button>
  </div>

  <div class="card">
    <h2>🔐 Connexion</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button onclick="signup()">S'inscrire</button>
    <button onclick="login()">Se connecter</button>
  </div>

  <div class="card">
    <h2>🛒 Commander</h2>

    <select id="service">
      <option>Instagram Followers</option>
      <option>TikTok Followers</option>
      <option>YouTube Views</option>
    </select>

    <input id="link" type="text" placeholder="Lien">
    <input id="quantity" type="number" placeholder="Quantité">

    <button onclick="makeOrder()">Commander</button>
  </div>

  <div class="card">
    <h2>📦 Mes commandes</h2>
    <div id="orders"></div>
  </div>

</div>

<footer style="text-align:center;padding:20px;">
  © 2026 NaltonBoost
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE (REMPLACE AVEC TON PROJET) */
const firebaseConfig = {
  apiKey: "AIzaSyAtjSdlnRR0e32bUFhh0KxqHYpIE2taekM",
  authDomain: "naltonboost.firebaseapp.com",
  projectId: "naltonboost",
  storageBucket: "naltonboost.firebasestorage.app",
  messagingSenderId: "1083345670696",
  appId: "1:1083345670696:web:0fd54e1a81d3d7ef925b1d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* USER STATE */
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    document.getElementById("userInfo").innerText = "Connecté: " + user.email;
    loadOrders();
  } else {
    document.getElementById("userInfo").innerText = "Non connecté";
    document.getElementById("orders").innerHTML = "";
  }
});

/* SIGN UP */
window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Compte créé"))
    .catch(e => alert(e.message));
}

/* LOGIN */
window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Connecté"))
    .catch(e => alert(e.message));
}

/* LOGOUT */
window.logout = function () {
  signOut(auth);
}

/* CREATE ORDER */
window.makeOrder = async function () {
  if (!currentUser) return alert("Connecte-toi d'abord");

  await addDoc(collection(db, "orders"), {
    user: currentUser.email,
    service: service.value,
    link: link.value,
    quantity: quantity.value,
    date: new Date()
  });

  alert("Commande envoyée");
  loadOrders();
}

/* LOAD ORDERS */
async function loadOrders() {
  if (!currentUser) return;

  const q = query(collection(db, "orders"), where("user", "==", currentUser.email));
  const snap = await getDocs(q);

  let html = "";

  snap.forEach(doc => {
    let d = doc.data();
    html += `<p>✔ ${d.service} - ${d.quantity}</p>`;
  });

  document.getElementById("orders").innerHTML = html;
}
</script>

</body>
</html>
