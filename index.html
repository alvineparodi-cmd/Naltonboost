<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaltonBoost</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    h1 {
      color: #00e5ff;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #16161d;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #00e5ff;
      font-weight: bold;
      cursor: pointer;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
    }

    .service {
      background: #16161d;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <h1>NaltonBoost 🚀</h1>
  <p>SMM Panel RDC - Instagram, TikTok, YouTube</p>
</header>

<div class="container">

  <div class="card">
    <h2>👤 Compte</h2>
    <p>Utilisateur: Kenalton</p>
    <p>Solde: $0.00</p>
    <p>Commandes: 0</p>
  </div>

  <div class="card">
    <h2>🛒 Nouvelle commande</h2>

    <label>Service</label>
    <select>
      <option>Instagram Followers</option>
      <option>TikTok Followers</option>
      <option>YouTube Views</option>
    </select>

    <label>Lien</label>
    <input type="text" placeholder="https://..." />

    <label>Quantité</label>
    <input type="number" placeholder="1000" />

    <button>Commander</button>
  </div>

</div>

<footer>
  © 2026 NaltonBoost
</footer>
